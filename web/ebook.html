<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Ebook - 英语电子书阅读</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --secondary: #10B981;
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border: #334155;
            --accent: #F59E0B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* 顶部导航 */
        .top-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.1em;
        }

        .nav-brand .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .nav-link.active {
            color: var(--text-primary);
            background: var(--primary);
        }

        /* 主容器 */
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 24px 40px;
        }

        /* 书籍选择页 */
        .book-list-page {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section {
            text-align: center;
            padding: 60px 20px;
        }

        .hero-title {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .book-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .book-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .book-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(79, 70, 229, 0.2);
        }

        .book-card:hover::before {
            opacity: 1;
        }

        .book-card .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: #EF4444;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-card:hover .delete-btn {
            opacity: 1;
        }

        .book-card .delete-btn:hover {
            background: #EF4444;
            color: white;
        }

        .book-card-title {
            font-weight: 600;
            font-size: 1.05em;
            margin-bottom: 8px;
            padding-right: 40px;
        }

        .book-card-meta {
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        .book-card-icon {
            font-size: 2em;
            margin-bottom: 12px;
        }

        /* 导入卡片 */
        .import-card {
            background: transparent;
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .import-card:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.1);
        }

        .import-card .icon {
            font-size: 2.5em;
            margin-bottom: 12px;
        }

        .import-card .text {
            color: var(--text-secondary);
            font-size: 0.95em;
        }

        .import-card .hint {
            color: var(--text-secondary);
            font-size: 0.8em;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* 阅读器页 */
        .reader-page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .reader-page.active {
            display: block;
        }

        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--text-primary);
        }

        .reader-title {
            font-size: 1.3em;
            font-weight: 600;
        }

        /* 阅读器主体 */
        .reader-main {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .reader-main {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
        }

        /* iPad 横屏双页模式 */
        @media (min-width: 1024px) and (max-height: 768px) and (orientation: landscape) {
            .reader-main {
                grid-template-columns: 1fr 1fr !important;
                gap: 32px;
            }

            .text-panel {
                min-height: auto;
                padding: 24px;
            }

            /* 双页书籍布局 */
            .book-spread {
                display: flex;
                gap: 40px;
                justify-content: center;
                align-items: flex-start;
            }

            .book-page {
                flex: 1;
                min-width: 0;
                background: var(--bg-dark);
                border-radius: 8px 0 0 8px;
                padding: 24px 32px 24px 24px;
                box-shadow: inset -4px 0 8px rgba(0,0,0,0.2);
                position: relative;
            }

            .book-page::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 20px;
                background: linear-gradient(to right, rgba(0,0,0,0.15), transparent);
            }

            .book-page-right {
                border-radius: 0 8px 8px 0;
                padding: 24px 24px 24px 32px;
                box-shadow: inset 4px 0 8px rgba(0,0,0,0.2);
            }

            .book-page-right::before {
                left: auto;
                right: 0;
                width: 20px;
                background: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
            }

            .page-gutter {
                width: 40px;
                flex-shrink: 0;
            }

            .sentence-display {
                font-size: 1.15em;
                line-height: 2;
            }

            /* 滑动手势区域 */
            .swipe-area {
                position: fixed;
                top: 0;
                bottom: 0;
                width: 30%;
                z-index: 50;
                cursor: pointer;
            }

            .swipe-area-left {
                left: 0;
            }

            .swipe-area-right {
                right: 0;
            }

            .swipe-hint {
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(79, 70, 229, 0.9);
                color: white;
                padding: 8px 20px;
                border-radius: 20px;
                font-size: 0.85em;
                opacity: 0;
                transition: opacity 0.3s;
                pointer-events: none;
            }

            .swipe-hint.show {
                opacity: 1;
            }
        }

        /* 文本区域 */
        .text-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            min-height: 500px;
        }

        .chapter-select-wrap {
            margin-bottom: 24px;
        }

        .chapter-select-wrap select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95em;
            cursor: pointer;
        }

        .chapter-select-wrap select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .sentence-display {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.25em;
            line-height: 2.2;
            color: var(--text-primary);
        }

        .sentence-item {
            display: inline;
            padding: 2px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sentence-item:hover {
            background: rgba(79, 70, 229, 0.2);
        }

        .sentence-item.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .sentence-item.read {
            color: var(--text-secondary);
        }

        .word-inline {
            cursor: pointer;
            border-bottom: 1px dashed var(--primary-light);
            transition: all 0.2s;
        }

        .word-inline:hover {
            background: rgba(79, 70, 229, 0.2);
            border-bottom-color: var(--primary);
        }

        .word-inline.looked {
            background: rgba(245, 158, 11, 0.2);
            border-bottom-color: var(--accent);
        }

        /* 播放控制 */
        .playback-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 32px 0 24px;
        }

        .play-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 32px rgba(79, 70, 229, 0.5);
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 跟读录音按钮 */
        .record-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #EF4444, #F97316);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
            margin: 0 auto;
        }

        .record-btn:hover {
            transform: scale(1.08);
        }

        .record-btn.recording {
            animation: pulse 1.5s ease infinite;
            background: linear-gradient(135deg, #DC2626, #B91C1C);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        }

        .record-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 发音评分面板 */
        .pronunciation-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
        }

        .pronunciation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .score-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: conic-gradient(var(--secondary) 0deg, var(--bg-dark) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: var(--bg-card);
        }

        .score-value {
            position: relative;
            font-size: 1.4em;
            font-weight: 700;
            color: var(--secondary);
        }

        .score-label {
            text-align: center;
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .score-level {
            font-size: 1.1em;
            font-weight: 600;
            text-align: center;
        }

        .score-level.excellent { color: #22C55E; }
        .score-level.great { color: #10B981; }
        .score-level.good { color: #3B82F6; }
        .score-level.practice { color: #F59E0B; }
        .score-level.try { color: #EF4444; }

        .transcription-result {
            margin-top: 12px;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
            font-size: 0.9em;
        }

        .transcription-label {
            color: var(--text-secondary);
            font-size: 0.8em;
            margin-bottom: 6px;
        }

        .transcription-text {
            color: var(--text-primary);
            line-height: 1.5;
        }

        .record-hint {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-top: 12px;
        }

        /* 跟读模式切换 */
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 进度条 */
        .progress-wrap {
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 4px;
            background: var(--bg-card);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
        }

        .sidebar-title {
            font-weight: 600;
            font-size: 0.95em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 翻译面板 */
        .translation-panel {
            min-height: 100px;
        }

        .translation-content {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.7;
        }

        .translation-loading {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        /* 生词本 */
        .vocab-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .vocab-empty {
            color: var(--text-secondary);
            font-size: 0.9em;
            text-align: center;
            padding: 20px 0;
        }

        .vocab-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .vocab-item:last-child {
            border-bottom: none;
        }

        .vocab-word {
            font-weight: 600;
            color: var(--primary-light);
        }

        .vocab-meaning {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* AR 面板 */
        .ar-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .ar-stat {
            text-align: center;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
        }

        .ar-stat-value {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--primary-light);
        }

        .ar-stat-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .ar-level {
            text-align: center;
            margin-bottom: 16px;
        }

        .ar-level-value {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 单词弹窗 */
        .word-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .word-modal-overlay.show {
            display: flex;
        }

        .word-modal {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 28px;
            width: 100%;
            max-width: 420px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .word-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .word-modal-word {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary-light);
        }

        .word-modal-phonetic {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 4px;
        }

        .word-modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-modal-close:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .word-modal-meanings {
            margin-bottom: 20px;
        }

        .word-meaning-item {
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .word-meaning-part {
            color: var(--secondary);
            font-weight: 600;
            font-size: 0.85em;
            margin-bottom: 6px;
        }

        .word-meaning-def {
            color: var(--text-primary);
            font-size: 0.95em;
        }

        .word-meaning-example {
            color: var(--text-secondary);
            font-size: 0.85em;
            font-style: italic;
            margin-top: 6px;
        }

        .word-modal-actions {
            display: flex;
            gap: 10px;
        }

        .word-modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-translate {
            background: var(--primary);
            color: white;
        }

        .btn-translate:hover {
            background: var(--primary-light);
        }

        .btn-vocab {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-vocab:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        /* 句子翻译弹窗 */
        .sentence-translation {
            padding: 16px;
            background: var(--bg-dark);
            border-radius: 10px;
            margin-top: 16px;
        }

        .sentence-translation-label {
            font-size: 0.8em;
            color: var(--secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .sentence-translation-text {
            color: var(--text-primary);
            font-size: 0.95em;
            line-height: 1.7;
        }

        /* 状态提示 */
        .status-playing {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: rgba(79, 70, 229, 0.2);
            border-radius: 10px;
            margin-bottom: 16px;
            color: var(--primary-light);
            font-size: 0.9em;
        }

        .audio-bars {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 16px;
        }

        .audio-bar {
            width: 3px;
            background: var(--primary-light);
            border-radius: 2px;
            animation: audioWave 0.8s ease infinite;
        }

        .audio-bar:nth-child(1) { animation-delay: 0s; }
        .audio-bar:nth-child(2) { animation-delay: 0.1s; }
        .audio-bar:nth-child(3) { animation-delay: 0.2s; }
        .audio-bar:nth-child(4) { animation-delay: 0.3s; }

        @keyframes audioWave {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }

        /* 隐藏 */
        .hidden {
            display: none !important;

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>

    <nav class="top-nav">

    <div class="main-container">

        <div class="book-list-page" id="book-list-page">

        <!-- 阅读器页 -->

            <!-- 滑动手势区域 -->

            <div class="reader-header">
                <a href="#" class="back-btn" onclick="showBookList()">
                    <span>←</span>
                    <span>返回书架</span>
                </a>
                <div class="reader-title" id="reader-title">Loading...</div>
                <div style="width:80px;"></div>
            </div>

            <div class="reader-main">
                <div class="text-panel">
                    <div class="chapter-select-wrap">
                        <select id="chapter-select" onchange="selectChapter(this.value)"></select>
                    </div>

                    <div class="progress-wrap">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <div class="progress-text">
                            <span id="progress-text">0 / 0</span>
                            <span id="progress-percent">0%</span>
                        </div>
                    </div>

                    <div class="status-playing hidden" id="status-playing">
                        <div class="audio-bars">
                            <div class="audio-bar"></div>
                            <div class="audio-bar"></div>
                            <div class="audio-bar"></div>
                            <div class="audio-bar"></div>
                        </div>
                        <span>正在朗读...</span>
                    </div>

                    <!-- 单页/双页显示 -->
                    <div id="single-page-view">
                        <div class="sentence-display" id="sentence-display"></div>
                    </div>

                    <div class="playback-controls">
                        <button class="nav-btn" id="btn-prev" onclick="prevSentence()">←</button>
                        <button class="play-btn" id="btn-play" onclick="playCurrentSentence()">▶</button>
                        <button class="nav-btn" id="btn-next" onclick="nextSentence()">→</button>
                    </div>
                </div>

                <div class="sidebar">
                    <!-- 跟读评分 -->
                    <div class="pronunciation-card">

                        <div class="mode-toggle">
                            <button class="mode-btn active" id="mode-read" onclick="setMode('read')">阅读</button>
                            <button class="mode-btn" id="mode-shadow" onclick="setMode('shadow')">跟读</button>

                        <div id="score-display" style="display:none;">
                            <div style="display:flex;justify-content:center;margin-top:16px;">
                                <div style="text-align:center;">
                                    <div class="score-circle" id="score-circle">
                                        <span class="score-value" id="score-value">--</span>

                                    <div class="score-level" id="score-level">等待评分</div>
                                </div>
                            </div>
                            <div class="transcription-result" id="transcription-result" style="display:none;">
                                <div class="transcription-label">你说的是：</div>
                                <div class="transcription-text" id="transcription-text"></div>

                        <div class="record-hint" id="record-hint">
                            点击麦克风，录音跟读

                    <div class="sidebar-card">

                        </div>
                    </div>

                    <div class="sidebar-card">
                        <div class="sidebar-title">📚 生词本 <span id="vocab-count" style="color:var(--text-secondary);font-weight:400;font-size:0.85em;">(0)</span></div>
                        <div class="vocab-list" id="vocab-list">
                            <div class="vocab-empty">点击单词加入生词本</div>
                        </div>

                    <div class="sidebar-card" style="cursor:pointer;" onclick="showARPanel()">
                        <div class="sidebar-title">📊 阅读等级</div>

                            <div class="ar-level-value" id="ar-display">--</div>
                        </div>
                        <div class="ar-stats">
                            <div class="ar-stat">
                                <div class="ar-stat-value" id="ar-words">--</div>
                                <div class="ar-stat-label">单词数</div>
                            </div>
                            <div class="ar-stat">
                                <div class="ar-stat-value" id="ar-sentences">--</div>
                                <div class="ar-stat-label">句子数</div>

                        </div>

    <!-- 单词弹窗 -->
    <div class="word-modal-overlay" id="word-modal">
        <div class="word-modal">
            <div class="word-modal-header">
                <div>
                    <div class="word-modal-word" id="modal-word">word</div>
                    <div class="word-modal-phonetic" id="modal-phonetic">/wɜːrd/</div>
                </div>
                <button class="word-modal-close" onclick="closeWordModal()">×</button>
            </div>
            <div class="word-modal-meanings" id="modal-meanings">
                <div class="word-meaning-item">
                    <div class="word-meaning-part">noun</div>
                    <div class="word-meaning-def">单词</div>
                    <div class="word-meaning-example">"例句"</div>
                </div>
            </div>
            <div class="word-modal-actions">
                <button class="btn-translate" onclick="playPronunciation()">🔊 发音</button>
                <button class="btn-vocab" id="btn-add-vocab" onclick="addToVocab()">+ 生词本</button>
            </div>
        </div>
    </div>

    <!-- AR 面板 -->
    <div class="word-modal-overlay" id="ar-modal" onclick="closeARPanel()">
        <div class="word-modal" onclick="event.stopPropagation()">
            <div class="word-modal-header">
                <div class="sidebar-title">📊 阅读等级评估</div>
                <button class="word-modal-close" onclick="closeARPanel()">×</button>
            </div>
            <div class="ar-level">
                <div class="ar-level-value" id="modal-ar-value">--</div>
                <div style="color:var(--text-secondary);font-size:0.9em;">ATOS 阅读水平</div>
            </div>
            <div class="ar-stats">
                <div class="ar-stat">
                    <div class="ar-stat-value" id="modal-ar-words">--</div>
                    <div class="ar-stat-label">总单词数</div>
                </div>
                <div class="ar-stat">
                    <div class="ar-stat-value" id="modal-ar-sentences">--</div>
                    <div class="ar-stat-label">总句数</div>
                </div>
                <div class="ar-stat">
                    <div class="ar-stat-value" id="modal-ar-unique">--</div>
                    <div class="ar-stat-label">不重复词</div>
                </div>
                <div class="ar-stat">
                    <div class="ar-stat-value" id="modal-ar-avg">--</div>
                    <div class="ar-stat-label">平均词长</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 状态
        let bookData = null;
        let currentBookId = null;
        let currentChapterIndex = 0;
        let currentSentenceIndex = 0;
        let sentences = [];
        let audioElement = null;
        let isPlaying = false;
        let currentWord = null;
        let vocabulary = JSON.parse(localStorage.getItem('vocabulary') || '[]');
        let lookedWords = JSON.parse(localStorage.getItem('lookedWords') || '{}');

        // 录音状态
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;
        let currentMode = 'read';  // 'read' 或 'shadow'

        // 初始化
        updateVocabCount();
        loadBookList();

        // 显示书籍列表
        function showBookList() {
            document.getElementById('book-list-page').classList.remove('hidden');
            document.getElementById('reader-page').classList.remove('active');
            loadBookList();
        }

        // 显示阅读器
        function showReader() {
            document.getElementById('book-list-page').classList.add('hidden');
            document.getElementById('reader-page').classList.add('active');
        }

        // 加载书籍列表
        async function loadBookList() {
            try {
                const res = await fetch('/api/books');
                const data = await res.json();
                const grid = document.getElementById('book-grid');

                if (data.success && data.books.length > 0) {
                    grid.innerHTML = data.books.map(b => `
                        <div class="book-card" onclick="loadBook('${b.id}')">
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteBook('${b.id}', '${b.title.replace(/'/g, "\\'")}')">×</button>
                            <div class="book-card-icon">📚</div>
                            <div class="book-card-title">${b.title}</div>
                            <div class="book-card-meta">${b.chapters} 章节 · ${b.sentences} 句子</div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:40px;">还没有书籍，请导入 EPUB</div>';
                }

                // 添加导入卡片
                grid.innerHTML += `
                    <div class="import-card" onclick="document.getElementById('import-file').click()">
                        <div class="icon">➕</div>
                        <div class="text">导入新书</div>
                        <div class="hint">支持 EPUB 格式</div>
                    </div>
                `;
            } catch (err) {
                console.error('Failed to load book list:', err);
            }
        }

        // 加载书籍
        async function loadBook(bookId) {
            try {
                const res = await fetch(`/api/book/${bookId}`);
                const data = await res.json();

                if (data.success) {
                    bookData = data.book;
                    currentBookId = bookId;
                    document.getElementById('reader-title').textContent = bookData.book;

                    const select = document.getElementById('chapter-select');
                    select.innerHTML = '';
                    bookData.chapters.forEach((ch, i) => {
                        select.innerHTML += `<option value="${i}">${ch.name} (${ch.sentences.length}句)</option>`;
                    });

                    selectChapter(0);
                    showReader();
                    calculateAR();
                }
            } catch (err) {
                console.error('Failed to load book:', err);
            }
        }

        // 选择章节
        function selectChapter(index) {
            currentChapterIndex = parseInt(index);
            sentences = bookData.chapters[currentChapterIndex].sentences;
            currentSentenceIndex = 0;
            updateDisplay();
            clearTranslation();
        }

        // 更新显示
        function updateDisplay() {
            const container = document.getElementById('sentence-display');

            let html = '';
            sentences.forEach((sent, i) => {
                let className = 'sentence-item';
                if (i < currentSentenceIndex) className += ' read';
                if (i === currentSentenceIndex) className += ' active';

                const words = sent.split(/(\s+)/);
                const processedWords = words.map(w => {
                    if (/^[a-zA-Z]+$/.test(w)) {
                        const isLooked = lookedWords[w.toLowerCase()];
                        return `<span class="word-inline ${isLooked ? 'looked' : ''}" onclick="lookupWord('${w}', this, event)">${w}</span>`;
                    }
                    return w;
                }).join('');

                html += `<span class="${className}" onclick="jumpTo(${i})">${processedWords} </span> `;
            });

            container.innerHTML = html;

            // 更新进度
            const total = sentences.length;
            const current = currentSentenceIndex + 1;
            const percent = total > 0 ? Math.round((currentSentenceIndex / total) * 100) : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-text').textContent = `${current} / ${total}`;
            document.getElementById('progress-percent').textContent = percent + '%';

            // 更新按钮状态
            document.getElementById('btn-prev').disabled = currentSentenceIndex === 0;
            document.getElementById('btn-next').disabled = currentSentenceIndex >= sentences.length - 1;
        }

        // 跳转到句子
        function jumpTo(index) {
            currentSentenceIndex = index;
            updateDisplay();
            translateSentence(sentences[index]);
            playCurrentSentence();
        }

        // 导航
        function prevSentence() {
            if (currentSentenceIndex > 0) {
                currentSentenceIndex--;
                updateDisplay();
                translateSentence(sentences[currentSentenceIndex]);
            }
        }

        function nextSentence() {
            if (currentSentenceIndex < sentences.length - 1) {
                currentSentenceIndex++;
                updateDisplay();
                translateSentence(sentences[currentSentenceIndex]);
            }
        }

        // 翻译句子
        async function translateSentence(sentence) {
            const el = document.getElementById('translation-content');
            el.innerHTML = '<div class="translation-loading">翻译中...</div>';

            try {
                const res = await fetch(
                    `https://api.mymemory.translated.net/get?q=${encodeURIComponent(sentence)}&langpair=en|zh-CN`
                );
                const data = await res.json();

                if (data.responseStatus === 200 && data.responseData?.translatedText) {
                    el.innerHTML = `<div class="sentence-translation-text">${data.responseData.translatedText}</div>`;
                } else {
                    el.innerHTML = '<div class="translation-content">翻译失败</div>';
                }
            } catch (err) {
                el.innerHTML = '<div class="translation-content">翻译失败</div>';
            }
        }

        function clearTranslation() {
            document.getElementById('translation-content').innerHTML = '点击上方句子，查看翻译';
        }

        // 查词
        async function lookupWord(word, element, event) {
            event.stopPropagation();
            const cleanWord = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
            if (!cleanWord) return;

            currentWord = cleanWord;
            element.classList.add('looked');
            lookedWords[cleanWord] = true;
            localStorage.setItem('lookedWords', JSON.stringify(lookedWords));

            const modal = document.getElementById('word-modal');
            document.getElementById('modal-word').textContent = cleanWord;
            document.getElementById('modal-phonetic').textContent = '加载中...';
            document.getElementById('modal-meanings').innerHTML = '<div class="translation-loading">查询中...</div>';
            modal.classList.add('show');

            // 更新生词本按钮状态
            const vocabBtn = document.getElementById('btn-add-vocab');
            vocabBtn.textContent = vocabulary.find(v => v.word === cleanWord) ? '✓ 已收录' : '+ 生词本';
            vocabBtn.disabled = !!vocabulary.find(v => v.word === cleanWord);

            try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${cleanWord}`);
                const data = await res.json();

                if (data && data.length > 0) {
                    const entry = data[0];
                    document.getElementById('modal-phonetic').textContent = entry.phonetic || '';

                    let html = '';
                    entry.meanings.slice(0, 3).forEach(m => {
                        m.definitions.slice(0, 2).forEach(def => {
                            html += `
                                <div class="word-meaning-item">
                                    <div class="word-meaning-part">${m.partOfSpeech}</div>
                                    <div class="word-meaning-def">${def.definition}</div>
                                    ${def.example ? `<div class="word-meaning-example">"${def.example}"</div>` : ''}
                                </div>
                            `;
                        });
                    });
                    document.getElementById('modal-meanings').innerHTML = html || '<div>未找到释义</div>';
                } else {
                    document.getElementById('modal-meanings').innerHTML = '<div>未找到释义</div>';
                }
            } catch (err) {
                document.getElementById('modal-meanings').innerHTML = '<div>查询失败</div>';
            }
        }

        function closeWordModal() {
            document.getElementById('word-modal').classList.remove('show');
        }

        // 发音
        async function playPronunciation() {
            if (!currentWord) return;
            try {
                const res = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: currentWord })
                });
                const data = await res.json();
                if (data.success) {
                    new Audio(data.audio_url).play();
                }
            } catch (err) {}
        }

        // 生词本
        function addToVocab() {
            if (!currentWord) return;
            if (vocabulary.find(v => v.word === currentWord)) return;

            const meaningEl = document.getElementById('modal-meanings');
            const parts = meaningEl.querySelectorAll('.word-meaning-part');
            const defs = meaningEl.querySelectorAll('.word-meaning-def');

            let meaning = '';
            parts.forEach((p, i) => {
                if (defs[i]) meaning += `${p.textContent}: ${defs[i].textContent}; `;
            });

            vocabulary.push({
                word: currentWord,
                meaning: meaning || '未找到释义',
                book: bookData?.book || 'Unknown',
                chapter: bookData?.chapters[currentChapterIndex]?.name || 'Unknown',
                date: new Date().toLocaleDateString()
            });

            localStorage.setItem('vocabulary', JSON.stringify(vocabulary));
            updateVocabCount();
            renderVocabList();

            const vocabBtn = document.getElementById('btn-add-vocab');
            vocabBtn.textContent = '✓ 已收录';
            vocabBtn.disabled = true;
        }

        function updateVocabCount() {
            document.getElementById('vocab-count').textContent = `(${vocabulary.length})`;
        }

        function renderVocabList() {
            const list = document.getElementById('vocab-list');
            if (vocabulary.length === 0) {
                list.innerHTML = '<div class="vocab-empty">点击单词加入生词本</div>';
                return;
            }
            list.innerHTML = vocabulary.slice(-10).reverse().map(v => `
                <div class="vocab-item">
                    <div class="vocab-word">${v.word}</div>
                    <div class="vocab-meaning">${v.meaning.substring(0, 50)}${v.meaning.length > 50 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        // AR 计算
        function calculateAR() {
            if (!bookData) return;

            let totalWords = 0, totalSentences = 0, uniqueWords = new Set(), totalSyllables = 0;

            bookData.chapters.forEach(ch => {
                ch.sentences.forEach(sent => {
                    const words = sent.split(/\s+/).filter(w => /^[a-zA-Z]+$/.test(w));
                    totalWords += words.length;
                    totalSentences++;
                    words.forEach(w => {
                        uniqueWords.add(w.toLowerCase());
                        totalSyllables += countSyllables(w);
                    });
                });
            });

            const avgWordLength = totalWords > 0 ? (totalSyllables / totalWords) : 0;
            const avgSentenceLength = totalSentences > 0 ? (totalWords / totalSentences) : 0;
            const ar = 4.86 + (0.12 * avgSentenceLength) + (0.05 * avgWordLength);

            document.getElementById('ar-display').textContent = ar.toFixed(1);
            document.getElementById('ar-words').textContent = totalWords;
            document.getElementById('ar-sentences').textContent = totalSentences;
        }

        function countSyllables(word) {
            word = word.toLowerCase();
            if (word.length <= 3) return 1;
            word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
            word = word.replace(/^y/, '');
            const matches = word.match(/[aeiouy]{1,2}/g);
            return matches ? matches.length : 1;
        }

        function showARPanel() {
            if (!bookData) return;
            calculateAR();
            document.getElementById('modal-ar-value').textContent = document.getElementById('ar-display').textContent;
            document.getElementById('modal-ar-words').textContent = document.getElementById('ar-words').textContent;
            document.getElementById('modal-ar-sentences').textContent = document.getElementById('ar-sentences').textContent;

            let totalWords = 0, totalSentences = 0, uniqueWords = new Set(), totalSyllables = 0;
            bookData.chapters.forEach(ch => {
                ch.sentences.forEach(sent => {
                    const words = sent.split(/\s+/).filter(w => /^[a-zA-Z]+$/.test(w));
                    totalWords += words.length;
                    totalSentences++;
                    words.forEach(w => {
                        uniqueWords.add(w.toLowerCase());
                        totalSyllables += countSyllables(w);
                    });
                });
            });
            document.getElementById('modal-ar-unique').textContent = uniqueWords.size;
            document.getElementById('modal-ar-avg').textContent = (totalWords > 0 ? (totalSyllables / totalWords) : 0).toFixed(1);

            document.getElementById('ar-modal').classList.add('show');
        }

        function closeARPanel() {
            document.getElementById('ar-modal').classList.remove('show');
        }

        // TTS 播放
        async function playCurrentSentence() {
            if (!sentences || sentences.length === 0) return;

            const text = sentences[currentSentenceIndex];
            const btn = document.getElementById('btn-play');
            const status = document.getElementById('status-playing');

            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                const res = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();

                if (data.success && data.audio_url) {
                    if (audioElement) audioElement.pause();
                    audioElement = new Audio(data.audio_url);
                    isPlaying = true;

                    audioElement.onended = () => {
                        isPlaying = false;
                        btn.disabled = false;
                        status.classList.add('hidden');
                    };

                    audioElement.onerror = () => {
                        isPlaying = false;
                        btn.disabled = false;
                        status.classList.add('hidden');
                    };

                    audioElement.play();
                } else {
                    btn.disabled = false;
                    status.classList.add('hidden');
                }
            } catch (err) {
                btn.disabled = false;
                status.classList.add('hidden');
            }
        }

        // 导入书籍
        async function importBook(file) {
            if (!file || !file.name.endsWith('.epub')) {
                alert('请选择 EPUB 格式文件');
                return;
            }

            const formData = new FormData();
            formData.append('epub', file);

            const grid = document.getElementById('book-grid');
            const importCard = grid.querySelector('.import-card');
            if (importCard) importCard.querySelector('.text').textContent = '导入中...';

            try {
                const res = await fetch('/api/book/import', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    loadBookList();
                    alert(`导入成功！${data.book_title}`);
                } else {
                    alert('导入失败: ' + data.error);
                    loadBookList();
                }
            } catch (err) {
                alert('导入失败');
                loadBookList();
            }
        }

        // 删除书籍
        async function deleteBook(bookId, bookTitle) {
            if (!confirm(`确定删除《${bookTitle}》？`)) return;

            try {
                await fetch(`/api/book/${bookId}`, { method: 'DELETE' });
                loadBookList();
            } catch (err) {
                alert('删除失败');
            }
        }

        // 双页模式：每次翻一页（每页一句）
        const SENTENCES_PER_PAGE = 1;

        // 检测是否为 iPad 横屏双页模式
        function isTwoPageMode() {
            return window.innerWidth >= 1024 && window.innerHeight <= 768 && window.innerHeight < window.innerWidth;
        }

        // 渲染单页或双页
        function updateDisplay() {
            const container = document.getElementById('sentence-display');
            const isTwoPage = isTwoPageMode();

            let html = '';

            if (isTwoPage) {
                // 双页模式：左页当前句，右页下一句
                const leftSent = sentences[currentSentenceIndex] || '';
                const rightSent = sentences[currentSentenceIndex + 1] || '';

                html = `<div class="book-spread">
                    <div class="book-page">
                        ${formatSentence(leftSent, currentSentenceIndex)}
                    </div>
                    <div class="page-gutter"></div>
                    <div class="book-page book-page-right">
                        ${rightSent ? formatSentence(rightSent, currentSentenceIndex + 1) : '<div style="color:var(--text-secondary);text-align:center;padding:40px;">下一章 →</div>'}
                    </div>
                </div>`;
            } else {
                // 单页模式
                sentences.forEach((sent, i) => {
                    html += formatSentence(sent, i);
                });
            }

            container.innerHTML = html;

            // 更新进度
            const total = sentences.length;
            const current = currentSentenceIndex + 1;
            const percent = total > 0 ? Math.round((currentSentenceIndex / total) * 100) : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-text').textContent = `${current} / ${total}`;
            document.getElementById('progress-percent').textContent = percent + '%';

            // 更新按钮状态
            document.getElementById('btn-prev').disabled = currentSentenceIndex === 0;
            document.getElementById('btn-next').disabled = currentSentenceIndex >= sentences.length - 1;
        }

        // 格式化句子
        function formatSentence(sent, index) {
            if (!sent) return '';
            let className = 'sentence-item';
            if (index < currentSentenceIndex) className += ' read';
            if (index === currentSentenceIndex) className += ' active';

            const words = sent.split(/(\s+)/);
            const processedWords = words.map(w => {
                if (/^[a-zA-Z]+$/.test(w)) {
                    const isLooked = lookedWords[w.toLowerCase()];
                    return `<span class="word-inline ${isLooked ? 'looked' : ''}" onclick="lookupWord('${w}', this, event)">${w}</span>`;
                }
                return w;
            }).join('');

            return `<span class="${className}" onclick="jumpTo(${index})">${processedWords} </span>`;
        }

        // 翻到下一页（双页模式）
        function nextPage() {
            if (currentSentenceIndex < sentences.length - 1) {
                currentSentenceIndex += SENTENCES_PER_PAGE;
                if (currentSentenceIndex >= sentences.length) currentSentenceIndex = sentences.length - 1;
                updateDisplay();
                translateSentence(sentences[currentSentenceIndex]);
            }
        }

        // 翻到上一页（双页模式）
        function prevPage() {
            if (currentSentenceIndex > 0) {
                currentSentenceIndex -= SENTENCES_PER_PAGE;
                if (currentSentenceIndex < 0) currentSentenceIndex = 0;
                updateDisplay();
                translateSentence(sentences[currentSentenceIndex]);
            }
        }

        // 滑动手势检测
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            if (!document.getElementById('reader-page').classList.contains('active')) return;
            if (isTwoPageMode()) {
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 80) {
                    if (diff > 0) {
                        nextPage();
                    } else {
                        prevPage();
                    }
                    showSwipeHint();
                }
            }
        }

        function showSwipeHint() {
            const hint = document.getElementById('swipe-hint');
            hint.classList.add('show');
            setTimeout(() => hint.classList.remove('show'), 2000);
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('reader-page').classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    if (isTwoPageMode()) prevPage();
                    else prevSentence();
                }
                else if (e.key === 'ArrowRight') {
                    if (isTwoPageMode()) nextPage();
                    else nextSentence();
                }
                else if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    playCurrentSentence();
                }
                else if (e.key === 'Escape') {
                    closeWordModal();
                    closeARPanel();
                }
            }
        });

        // 窗口大小变化时重新渲染
        window.addEventListener('resize', () => {
            if (bookData && sentences.length > 0) {
                updateDisplay();
            }
        });

        // 点击弹窗外部关闭
        document.getElementById('word-modal').addEventListener('click', (e) => {
            if (e.target.id === 'word-modal') closeWordModal();
        });

        // ========== 跟读评分功能 ==========

        let recordingTimeout = null;

        // 切换阅读/跟读模式
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-read').classList.toggle('active', mode === 'read');
            document.getElementById('mode-shadow').classList.toggle('active', mode === 'shadow');
            document.getElementById('record-hint').textContent = mode === 'read'
                ? '阅读模式下跳过评分'
                : '点击麦克风，录音跟读';
            document.getElementById('score-display').style.display = 'none';

            if (recognition && isRecording) {
                recognition.stop();
                isRecording = false;
            }
        }

        // 切换录音
        function toggleRecord() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        // 开始录音识别
        function startRecording() {
            if (!sentences || sentences.length === 0) return;

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('record-hint').textContent = '❌ 浏览器不支持语音识别';
                return;
            }

            // 先播放参考音频
            playReferenceAudio();

            isRecording = true;
            document.getElementById('btn-record').classList.add('recording');
            document.getElementById('btn-record').textContent = '⏹';
            document.getElementById('record-hint').textContent = '🎤 正在听...';

            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            let finalTranscript = '';

            recognition.onresult = (event) => {
                finalTranscript = event.results[0][0].transcript;
                console.log('识别结果:', finalTranscript);
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'no-speech') {
                    document.getElementById('record-hint').textContent = '⚠️ 没检测到声音，请重试';
                } else if (event.error === 'not-allowed') {
                    document.getElementById('record-hint').textContent = '❌ 请允许麦克风权限';
                } else {
                    document.getElementById('record-hint').textContent = '❌ 识别出错: ' + event.error;
                }
                stopRecording();
            };

            recognition.onend = () => {
                console.log('识别结束, finalTranscript:', finalTranscript);
                stopRecording();
                if (finalTranscript) {
                    const original = sentences[currentSentenceIndex];
                    showPronunciationScore(original, finalTranscript);
                } else {
                    document.getElementById('record-hint').textContent = '⚠️ 没听清，请重试';
                }
            };

            // 超时保护（8秒）
            recordingTimeout = setTimeout(() => {
                if (isRecording) {
                    console.log('超时，强制停止');
                    recognition.stop();
                }
            }, 8000);

            try {
                recognition.start();
            } catch (err) {
                console.error('Failed to start recognition:', err);
                document.getElementById('record-hint').textContent = '❌ 无法启动识别';
                stopRecording();
            }
        }

        // 停止录音
        function stopRecording() {
            isRecording = false;
            if (recordingTimeout) {
                clearTimeout(recordingTimeout);
                recordingTimeout = null;
            }
            document.getElementById('btn-record').classList.remove('recording');
            document.getElementById('btn-record').textContent = '🎙️';
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
        }

        // 播放参考音频
        async function playReferenceAudio() {
            if (!sentences || sentences.length === 0) return;
            try {
                const ttsRes = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: sentences[currentSentenceIndex] })
                });
                const data = await ttsRes.json();
                if (data.success) {
                    const audio = new Audio(data.audio_url);
                    audio.play();
                }
            } catch (err) {
                console.error('TTS error:', err);
            }
        }

        // 显示发音评分
        function showPronunciationScore(original, transcribed) {
            console.log('评分:', original, 'vs', transcribed);
            const score = calculateSimilarity(original, transcribed);
            const level = getScoreLevel(score);

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('score-value').textContent = score;
            document.getElementById('score-level').textContent = level.text;
            document.getElementById('score-level').className = 'score-level ' + level.class;

            // 更新圆形进度
            const degrees = (score / 100) * 360;
            document.getElementById('score-circle').style.background =
                `conic-gradient(${level.color} ${degrees}deg, var(--bg-dark) ${degrees}deg)`;

            // 显示识别结果
            document.getElementById('transcription-result').style.display = 'block';
            document.getElementById('transcription-text').textContent = transcribed;

            document.getElementById('record-hint').textContent = '点击麦克风再读一遍';
        }

        // 计算相似度
        function calculateSimilarity(original, transcribed) {
            const orig = original.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
            const trans = transcribed.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();

            if (!trans) return 0;
            if (orig === trans) return 100;

            const origWords = orig.split(/\s+/);
            const transWords = trans.split(/\s+/);

            let matchCount = 0;
            transWords.forEach(w => {
                if (origWords.includes(w)) matchCount++;
            });

            // 综合考虑匹配率和完整度
            const matchRate = matchCount / transWords.length;
            const coverage = matchCount / origWords.length;
            const score = Math.round((matchRate * 0.6 + coverage * 0.4) * 100);

            return Math.min(100, score);
        }

        // 获取评分等级
        function getScoreLevel(score) {
            if (score >= 90) return { text: '🌟 非常棒！', class: 'excellent', color: '#22C55E' };
            if (score >= 75) return { text: '👍 很棒！', class: 'great', color: '#10B981' };
            if (score >= 60) return { text: '📚 不错！', class: 'good', color: '#3B82F6' };
            if (score >= 40) return { text: '💪 继续加油', class: 'practice', color: '#F59E0B' };
            return { text: '📖 多读几遍', class: 'try', color: '#EF4444' };
        }
    </script>
</body>
