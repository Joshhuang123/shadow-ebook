<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 小智 - 语音交互 Demo</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        color: white;
    }
    h1 {
        font-size: 1.5em;
        margin: 20px 0;
        text-align: center;
        color: #e0e0e0;
    }

    /* 数字人区域 */
    .avatar-container {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 20px auto;
    }
    .avatar-image {
        width: 100%;
        height: 100%;
        border-radius: 20px;
        background: linear-gradient(135deg, #2d2d44, #1a1a2e);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        overflow: hidden;
    }
    .avatar-placeholder {
        font-size: 120px;
        opacity: 0.8;
    }

    /* Canvas 绘制口型 */
    #mouthCanvas {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 60px;
        pointer-events: none;
    }

    /* 波形/状态指示 */
    .status-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 15px 0;
        font-size: 0.9em;
        color: #aaa;
    }
    .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #555;
    }
    .status-dot.listening { background: #ef4444; animation: pulse 1s infinite; }
    .status-dot.speaking { background: #10b981; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* 对话气泡 */
    .chat-area {
        width: 100%;
        max-width: 500px;
        height: 250px;
        overflow-y: auto;
        background: rgba(255,255,255,0.05);
        border-radius: 16px;
        padding: 15px;
        margin: 15px 0;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .message {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 14px;
        margin-bottom: 10px;
        font-size: 0.9em;
        line-height: 1.5;
        word-break: break-word;
    }
    .message.user {
        background: #4F46E5;
        color: white;
        margin-left: auto;
        border-bottom-right-radius: 4px;
    }
    .message.xiaozhi {
        background: rgba(255,255,255,0.15);
        color: #e0e0e0;
        border-bottom-left-radius: 4px;
    }

    /* 控制按钮 */
    .controls {
        display: flex;
        gap: 15px;
        margin: 20px 0;
    }
    .btn {
        padding: 14px 28px;
        border: none;
        border-radius: 50px;
        font-size: 1em;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .btn-record {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
    }
    .btn-record:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(239,68,68,0.4); }
    .btn-record.recording { animation: shake 0.5s infinite; }
    @keyframes shake {
        0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)}
    }
    .btn-stop {
        background: rgba(255,255,255,0.1);
        color: white;
        border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-stop:hover { background: rgba(255,255,255,0.2); }

    /* 调试信息 */
    .debug {
        font-size: 0.75em;
        color: #666;
        background: rgba(0,0,0,0.3);
        padding: 10px;
        border-radius: 8px;
        max-width: 500px;
        width: 100%;
        font-family: monospace;
        max-height: 100px;
        overflow-y: auto;
    }

    /* 口型样式（A-F） */
    .mouth-shapes {
        display: none;
    }
</style>
</head>
<body>

<h1>🦊 小智语音交互 Demo</h1>

<!-- 数字人区域 -->
<div class="avatar-container">
    <div class="avatar-image">
        <div class="avatar-placeholder" id="avatarFace">🦊</div>
    </div>
    <canvas id="mouthCanvas" width="240" height="120"></canvas>
</div>

<!-- 状态 -->
<div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">点击按钮开始对话</span>
</div>

<!-- 对话区 -->
<div class="chat-area" id="chatArea">
    <div class="message xiaozhi">👋 你好！我是小智，有什么数学问题想和我一起探讨吗？</div>
</div>

<!-- 控制按钮 -->
<div class="controls">
    <button class="btn btn-record" id="btnRecord" onclick="toggleRecording()">
        🎤 按住说话
    </button>
</div>

<!-- 调试 -->
<div class="debug" id="debugLog"></div>

<script>
// ==================== 配置 ====================
const COZE_API_KEY = 'pat_3t3OKLgxdmm38sZQHpWCd6XjDObNqsS3eVIQKa1SvGWAHrFxmvF1OUwmfxasBVQY';
const COZE_BOT_ID = '7636245270409461810';  // 小智 Bot ID

// ==================== 状态 ====================
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let recognition = null;
let synth = window.speechSynthesis;
let currentAudio = null;

// ==================== 嘴形动画 ====================
// 6个基础嘴形（用Canvas绘制的简化形状）
const MOUTH_SHAPES = {
    'A': { open: 0.3, width: 60 },   // 张嘴小
    'B': { open: 0.5, width: 70 },  // 张嘴中
    'C': { open: 0.7, width: 80 },  // 张嘴大
    'D': { open: 0.4, width: 50 },  // 椭圆
    'E': { open: 0.2, width: 55 },  // 张嘴微笑
    'F': { open: 0, width: 0 }      // 闭合
};
let currentMouth = 'F';
let mouthAnimationId = null;

// ==================== 初始化语音识别 ====================
function initSpeechRecognition() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        log('⚠️ 浏览器不支持语音识别，建议使用 Chrome');
        return null;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        log('📝 识别: ' + text);
        handleUserInput(text);
    };

    recognition.onerror = (e) => {
        log('❌ 识别错误: ' + e.error);
        stopRecording();
    };

    recognition.onend = () => {
        if (isRecording) stopRecording();
    };

    return recognition;
}

// ==================== 录音控制 ====================
async function toggleRecording() {
    if (isRecording) {
        stopRecording();
    } else {
        startRecording();
    }
}

function startRecording() {
    if (!recognition) initSpeechRecognition();
    if (!recognition) return;

    isRecording = true;
    audioChunks = [];
    document.getElementById('btnRecord').classList.add('recording');
    document.getElementById('btnRecord').textContent = '🎤 录音中...';
    setStatus('listening', '正在听...');

    try {
        // 同时启动语音识别和MediaRecorder
        recognition.start();

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.start();
        log('✅ 开始录音');

        // 录音超时 30秒
        setTimeout(() => {
            if (isRecording) stopRecording();
        }, 30000);
    } catch (err) {
        log('❌ 麦克风错误: ' + err.message);
        stopRecording();
    }
}

function stopRecording() {
    isRecording = false;
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('btnRecord').textContent = '🎤 按住说话';

    if (recognition) {
        try { recognition.stop(); } catch(e) {}
    }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }

    setStatus('', '处理中...');

    // 如果有录音数据，转换为文字
    if (audioChunks.length > 0) {
        transcribeAudio();
    }
}

// ==================== 音频转文字（备用，用Web Speech API） ====================
function transcribeAudio() {
    // 这里可以使用 Whisper API 或其他云服务
    // 当前使用浏览器内置语音识别
    log('📝 使用语音识别转文字...');
}

// ==================== 处理用户输入 ====================
async function handleUserInput(text) {
    addMessage('user', text);
    setStatus('speaking', '小智思考中...');
    log('📤 发送到Coze: ' + text);

    try {
        // 调用 Coze API
        const response = await fetch('https://api.coze.cn/v3/chat', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${COZE_API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                bot_id: COZE_BOT_ID,
                user_id: 'demo_user',
                session_id: 'demo_session',
                stream: false,
                auto_save_history: false,
                additional_messages: [{
                    role: 'user',
                    content: text,
                    content_type: 'text'
                }]
            })
        });

        const data = await response.json();
        log('📦 Coze响应: ' + JSON.stringify(data).substring(0, 200));

        if (data.code === 0 && data.data) {
            // 获取回复
            const reply = await pollForReply(data.data.chat_id, data.data.conversation_id);
            if (reply) {
                await playTTS(reply);
                addMessage('xiaozhi', reply);
            }
        } else {
            addMessage('xiaozhi', '抱歉，我遇到了一点问题，请稍后再试。');
        }
    } catch (err) {
        log('❌ API错误: ' + err.message);
        addMessage('xiaozhi', '网络有点问题，等会儿再试试？');
    }

    setStatus('', '点击按钮继续对话');
}

// ==================== 轮询获取Coze回复 ====================
async function pollForReply(chat_id, conversation_id) {
    for (let i = 0; i < 30; i++) {
        await sleep(1000);
        try {
            const res = await fetch(`https://api.coze.cn/v3/chat/retrieve?chat_id=${chat_id}&conversation_id=${conversation_id}`, {
                headers: { 'Authorization': `Bearer ${COZE_API_KEY}` }
            });
            const data = await res.json();
            log(`⏳ 轮询${i+1}: status=${data.data?.status}`);

            if (data.data?.status === 'completed') {
                // 获取消息
                const msgRes = await fetch(`https://api.coze.cn/v3/chat/message/list?chat_id=${chat_id}&conversation_id=${conversation_id}`, {
                    headers: { 'Authorization': `Bearer ${COZE_API_KEY}` }
                });
                const msgData = await msgRes.json();

                for (const msg of (msgData.data || [])) {
                    if (msg.role === 'assistant' && msg.content) {
                        return msg.content;
                    }
                }
            } else if (data.data?.status === 'failed') {
                return null;
            }
        } catch (e) {
            log('轮询错误: ' + e.message);
        }
    }
    return null;
}

// ==================== TTS 播放 ====================
async function playTTS(text) {
    log('🔊 合成语音: ' + text.substring(0, 50) + '...');

    try {
        // 优先使用 Edge TTS
        const ttsRes = await fetch('/api/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice: 'zh-CN-XiaoxiaoNeural' })
        });

        if (ttsRes.ok) {
            const ttsData = await ttsRes.json();
            if (ttsData.success && ttsData.audio_url) {
                await playAudio(ttsData.audio_url);
                return;
            }
        }
    } catch (e) {
        log('TTS API失败: ' + e.message);
    }

    // 降级到浏览器 TTS
    speakWithBrowserTTS(text);
}

function speakWithBrowserTTS(text) {
    if (!synth) return;
    synth.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 1.0;
    utterance.pitch = 1;

    // 监听音频播放，同时驱动嘴形
    utterance.onstart = () => {
        log('🔊 浏览器TTS开始');
        animateMouth();
    };

    utterance.onend = () => {
        log('🔇 TTS结束');
        stopMouthAnimation();
        setStatus('', '对话完成');
    };

    utterance.onboundary = (e) => {
        // 根据音素更新嘴形
        updateMouthByPhoneme(e.utterance.text[e.charIndex]);
    };

    synth.speak(utterance);
}

async function playAudio(url) {
    return new Promise((resolve) => {
        if (currentAudio) currentAudio.pause();
        currentAudio = new Audio(url);

        currentAudio.onplay = () => {
            setStatus('speaking', '小智说话中...');
            animateMouth();
        };

        currentAudio.onended = () => {
            stopMouthAnimation();
            setStatus('', '对话完成');
            resolve();
        };

        currentAudio.onerror = () => {
            log('❌ 音频播放失败，尝试浏览器TTS');
            speakWithBrowserTTS(url);
            resolve();
        };

        currentAudio.play().catch(e => {
            log('❌ 播放错误: ' + e.message);
            resolve();
        });
    });
}

// ==================== 嘴形动画 ====================
function animateMouth() {
    if (mouthAnimationId) return;

    const canvas = document.getElementById('mouthCanvas');
    const ctx = canvas.getContext('2d');

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const shape = MOUTH_SHAPES[currentMouth];
        if (shape.open === 0) {
            // 闭嘴 - 画一条线
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.ellipse(canvas.width/2, canvas.height/2, shape.width/2, 3, 0, 0, Math.PI * 2);
            ctx.fill();
        } else {
            // 张嘴 - 画椭圆
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.ellipse(
                canvas.width/2,
                canvas.height/2 + 10,
                shape.width/2,
                (canvas.height/2) * shape.open,
                0, 0, Math.PI * 2
            );
            ctx.fill();

            // 嘴唇外圈
            ctx.strokeStyle = '#dc2626';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        mouthAnimationId = requestAnimationFrame(draw);
    }

    draw();

    // 随机变换嘴形
    mouthInterval = setInterval(() => {
        const keys = Object.keys(MOUTH_SHAPES);
        currentMouth = keys[Math.floor(Math.random() * keys.length)];
    }, 150);
}

let mouthInterval = null;

function stopMouthAnimation() {
    if (mouthAnimationId) {
        cancelAnimationFrame(mouthAnimationId);
        mouthAnimationId = null;
    }
    if (mouthInterval) {
        clearInterval(mouthInterval);
        mouthInterval = null;
    }
    currentMouth = 'F';
}

function updateMouthByPhoneme(char) {
    // 简化的中文拼音嘴形映射
    const p = char.toLowerCase();
    if ('aeiou'.includes(p)) {
        currentMouth = 'A';
    } else if ('bpm'.includes(p)) {
        currentMouth = 'F';
    } else if ('o'.includes(p)) {
        currentMouth = 'C';
    }
}

// ==================== UI 辅助 ====================
function addMessage(role, text) {
    const chat = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function setStatus(type, text) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-dot' + (type ? ' ' + type : '');
    txt.textContent = text;
}

function log(msg) {
    const debug = document.getElementById('debugLog');
    const time = new Date().toLocaleTimeString();
    debug.textContent = `[${time}] ${msg}\n` + debug.textContent;
    debug.textContent = debug.textContent.substring(0, 500);
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

// ==================== 初始化 ====================
initSpeechRecognition();
setStatus('', '准备就绪');
log('✅ 小智语音交互Demo已加载');
log('💡 提示：使用Chrome浏览器效果最佳');
</script>

</body>
</html>
